version: "3.9"

services:
  violence-api:
    build: .
    container_name: violence-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app/models:/app/models
    environment:
      - AUTH_KEY=${AUTH_KEY:-your-secret-key}
      - MOCK_MODE=${MOCK_MODE:-false}
    deploy:
      resources:
        limits:
          memory: 4G # Increased since VPS has 24GB
